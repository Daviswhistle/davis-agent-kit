name: Apply review fixes

on:
  push:
    branches:
      - agent/address-pr15-review-feedback

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply review fixes and regression tests
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"expected text not found in {path}: {old[:80]!r}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace(
              "README.md",
              '''KIT_DIR="$(pwd)"

          mkdir -p "$HOME/.codex/skills"

          if [ -e "$HOME/.codex/davis-agent-kit" ] && [ ! -L "$HOME/.codex/davis-agent-kit" ]; then
            printf '%s\\n' "$HOME/.codex/davis-agent-kit exists and is not a symlink"
            exit 1
          fi

          rm -f "$HOME/.codex/davis-agent-kit"
          rm -f "$HOME/.codex/AGENTS.md"
          rm -rf "$HOME/.codex/skills/translation-quality"
          rm -rf "$HOME/.codex/skills/handoff-agent-builder"
          rm -rf "$HOME/.codex/skills/software-engineering"

          ln -s "$KIT_DIR" "$HOME/.codex/davis-agent-kit"
          ln -s "$HOME/.codex/davis-agent-kit/AGENTS.md" "$HOME/.codex/AGENTS.md"
          ln -s "$HOME/.codex/davis-agent-kit/skills/translation-quality" "$HOME/.codex/skills/translation-quality"
          ln -s "$HOME/.codex/davis-agent-kit/skills/handoff-agent-builder" "$HOME/.codex/skills/handoff-agent-builder"
          ln -s "$HOME/.codex/davis-agent-kit/skills/software-engineering" "$HOME/.codex/skills/software-engineering"''',
              '''KIT_DIR="$(pwd)"
          CODEX_DIR="${CODEX_HOME:-$HOME/.codex}"

          mkdir -p "$CODEX_DIR/skills"

          if [ -e "$CODEX_DIR/davis-agent-kit" ] && [ ! -L "$CODEX_DIR/davis-agent-kit" ]; then
            printf '%s\\n' "$CODEX_DIR/davis-agent-kit exists and is not a symlink"
            exit 1
          fi

          rm -f "$CODEX_DIR/davis-agent-kit"
          rm -f "$CODEX_DIR/AGENTS.md"
          rm -rf "$CODEX_DIR/skills/translation-quality"
          rm -rf "$CODEX_DIR/skills/handoff-agent-builder"
          rm -rf "$CODEX_DIR/skills/software-engineering"

          ln -s "$KIT_DIR" "$CODEX_DIR/davis-agent-kit"
          ln -s "$CODEX_DIR/davis-agent-kit/AGENTS.md" "$CODEX_DIR/AGENTS.md"
          ln -s "$CODEX_DIR/davis-agent-kit/skills/translation-quality" "$CODEX_DIR/skills/translation-quality"
          ln -s "$CODEX_DIR/davis-agent-kit/skills/handoff-agent-builder" "$CODEX_DIR/skills/handoff-agent-builder"
          ln -s "$CODEX_DIR/davis-agent-kit/skills/software-engineering" "$CODEX_DIR/skills/software-engineering"''',
          )

          replace(
              "skills/translation-quality/SKILL.md",
              '''2. Choose one primary document profile during intake:
             - `references/profiles/transcript.md` for earnings calls, interviews, Q&A, interpreted calls, or any speaker-driven document.
             - `references/profiles/report.md` for annual reports, audit reports, prospectuses, financial statements, governance reports, or page/table-heavy formal documents.
          3. Load both profiles only when the source genuinely combines both contracts. Record the primary profile and any secondary profile in `work/qa_report.md`.''',
              '''2. Choose the applicable loading path during intake:
             - Use `core-only` for general business prose, press releases, articles, blog posts, web documents, and other inputs that are neither speaker-driven nor formal report artifacts.
             - Use `references/profiles/transcript.md` for earnings calls, interviews, Q&A, interpreted calls, or any speaker-driven document.
             - Use `references/profiles/report.md` for annual reports, audit reports, prospectuses, financial statements, governance reports, or page/table-heavy formal documents.
          3. Load both profiles only when the source genuinely combines both contracts. Record the loading path, primary profile if any, and any secondary profile in `work/qa_report.md`.''',
          )
          replace(
              "skills/translation-quality/SKILL.md",
              "2. Identify the source, document type, primary profile, output format, and reader-visible metadata.",
              "2. Identify the source, document type, loading path, optional profile, output format, and reader-visible metadata.",
          )
          replace(
              "skills/translation-quality/SKILL.md",
              "7. Run conceptual review with the reviewer named by the selected profile, then run mechanical and source-fidelity QA.",
              "7. Run conceptual review with the applicable profile reviewer; for `core-only`, use `agents/korean_translation_reviewer.md`. Then run mechanical and source-fidelity QA.",
          )
          replace(
              "skills/translation-quality/SKILL.md",
              "2. selected profile contract",
              "2. selected loading-path contract",
          )

          replace(
              "scripts/doctor.py",
              "import sys\nfrom typing import Literal",
              "import sys\nfrom typing import Literal\nfrom urllib.parse import urlsplit, urlunsplit",
          )
          replace(
              "scripts/doctor.py",
              '''def repository_checks(repo_root: Path, manifest: KitManifest) -> list[Result]:''',
              '''def sanitize_git_remote(remote: str) -> str:
              remote = remote.strip()
              if "://" in remote:
                  parsed = urlsplit(remote)
                  hostname = parsed.hostname or ""
                  port = f":{parsed.port}" if parsed.port is not None else ""
                  return urlunsplit((parsed.scheme, hostname + port, parsed.path, "", ""))
              if "@" in remote:
                  return remote.split("@", 1)[1]
              return remote


          def repository_checks(repo_root: Path, manifest: KitManifest) -> list[Result]:''',
          )
          replace(
              "scripts/doctor.py",
              'results.append(Result("INFO", "git-origin", remote))',
              'results.append(Result("INFO", "git-origin", sanitize_git_remote(remote)))',
          )

          replace(
              "user-model/README.md",
              "재검토: YYYY-MM-DD 또는 구체적인 재검토 조건",
              "재검토: YYYY-MM-DD 또는 구체적인 재검토 조건(예: 사용자 정정 시)",
          )
          replace(
              "tests/test_tooling_contract.py",
              "from kit_manifest import load_manifest, validate_manifest  # noqa: E402",
              "from doctor import sanitize_git_remote  # noqa: E402\nfrom kit_manifest import load_manifest, validate_manifest  # noqa: E402",
          )
          replace(
              "tests/test_tooling_contract.py",
              '''class ToolingContractTests(unittest.TestCase):
              def test_manifest_covers_every_installed_skill(self) -> None:''',
              '''class ToolingContractTests(unittest.TestCase):
              def test_readme_installation_honors_codex_home(self) -> None:
                  readme = (ROOT / "README.md").read_text(encoding="utf-8")
                  install = readme.split("## 설치", 1)[1].split("## 현재 스킬", 1)[0]
                  self.assertIn('CODEX_DIR="${CODEX_HOME:-$HOME/.codex}"', install)
                  self.assertNotIn('mkdir -p "$HOME/.codex/skills"', install)

              def test_git_origin_is_sanitized_before_output(self) -> None:
                  self.assertEqual(
                      sanitize_git_remote("https://user:secret@github.com/owner/repo.git?token=x#frag"),
                      "https://github.com/owner/repo.git",
                  )
                  self.assertEqual(
                      sanitize_git_remote("git@github.com:owner/repo.git"),
                      "github.com:owner/repo.git",
                  )
                  self.assertEqual(
                      sanitize_git_remote("https://github.com/owner/repo.git"),
                      "https://github.com/owner/repo.git",
                  )

              def test_manifest_covers_every_installed_skill(self) -> None:''',
          )
          replace(
              "tests/test_tooling_contract.py",
              'self.assertRegex(review_value, r"^조건: \\S.+", title)',
              'self.assertRegex(review_value, r"^\\S(?:.*\\S)?$", title)',
          )

          replace(
              "skills/translation-quality/tests/test_skill_contract.py",
              '''            "Choose one primary document profile",
              "Load both profiles only when the source genuinely combines both contracts",''',
              '''            "Choose the applicable loading path",
              "Use `core-only` for general business prose",
              "Load both profiles only when the source genuinely combines both contracts",''',
          )
          replace(
              "skills/translation-quality/tests/test_skill_contract.py",
              '''        self.assertNotIn("## Speaker And Paragraph Formatting", report_text)

              required_phrases = [''',
              '''        self.assertNotIn("## Speaker And Paragraph Formatting", report_text)
              self.assertIn("for `core-only`, use `agents/korean_translation_reviewer.md`", skill_text)
              self.assertIn("selected loading-path contract", skill_text)

              required_phrases = [''',
          )
          PY

      - name: Validate all contracts and tests
        run: python3 scripts/validate_kit.py

      - name: Publish fixes and remove bootstrap workflow
        run: |
          git config user.name "Davis Agent Kit Automation"
          git config user.email "actions@users.noreply.github.com"
          rm .github/workflows/apply-review-fixes.yml
          git add README.md scripts/doctor.py tests/test_tooling_contract.py user-model/README.md skills/translation-quality/SKILL.md skills/translation-quality/tests/test_skill_contract.py .github/workflows/apply-review-fixes.yml
          git commit -m "Address validation review feedback"
          git push origin HEAD:agent/address-pr15-review-feedback
