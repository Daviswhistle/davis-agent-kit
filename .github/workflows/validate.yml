name: Validate kit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run all contracts and tests
        id: validation
        shell: bash
        run: |
          set +e
          python3 scripts/validate_kit.py --quiet > validation.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-log
          path: validation.log

      - name: Fail when validation failed
        if: steps.validation.outputs.status != '0'
        run: exit 1
